<!DOCTYPE html>
<html lang="en">
<head>
    <title>ARRO Admin Secure Portal</title>
    <style>
        body { font-family: Arial, sans-serif; background: #1a1a1a; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-box { background: #2a2a2a; padding: 30px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); text-align: center; width: 300px; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: none; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #007bff; border: none; color: white; border-radius: 4px; cursor: pointer; font-weight: bold; }
        button:hover { background: #0056b3; }
        #error { color: #ff6b6b; margin-top: 10px; font-size: 14px; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>ARRO Admin Login</h2>
        <input type="email" id="email" placeholder="Admin Email" value="admin@arro.edu.pk">
        <input type="password" id="password" placeholder="Master Password">
        <button onclick="loginAdmin()">Access Panel</button>
        <div id="error"></div>
    </div>

    <script>
        async function loginAdmin() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('error');

            const response = await fetch('/admin-login-quick', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });

            const data = await response.json();
            if (data.success) {
                window.location.href = data.redirect;
            } else {
                errorDiv.innerText = data.message;
            }
        }
    </script>
</body>
</html>
